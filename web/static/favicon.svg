<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Globe -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#g)" stroke-width="3"/>
  <!-- Latitude lines -->
  <ellipse cx="32" cy="32" rx="28" ry="10" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="32" cy="32" rx="28" ry="20" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.35"/>
  <!-- Longitude line -->
  <ellipse cx="32" cy="32" rx="12" ry="28" fill="none" stroke="url(#g)" stroke-width="1.5" opacity="0.5"/>
  <!-- Meridian -->
  <line x1="32" y1="4" x2="32" y2="60" stroke="url(#g)" stroke-width="1.5" opacity="0.35"/>
  <!-- Ping dot -->
  <circle cx="42" cy="20" r="5" fill="#3b82f6" opacity="0.9"/>
  <circle cx="42" cy="20" r="8" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
  <circle cx="42" cy="20" r="11" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.2"/>
  <!-- Speed arrow -->
  <path d="M18 46 L28 36" stroke="#34d399" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M24 36 L28 36 L28 40" fill="none" stroke="#34d399" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
