<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics — GeoIP Performance Analyzer</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/theme.js"></script>
    <script src="/static/video-wallpapers.js"></script>
    <style>
        .top-section { margin-bottom: 1.5rem; }
        .top-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem; flex-wrap: wrap; }
        .top-header h3 { margin: 0; }
        .top-select { padding: 0.3rem 0.5rem; border-radius: 6px; background: var(--panel-bg); color: var(--text-primary); border: 1px solid var(--border-color); font-size: 0.8rem; font-family: inherit; }
        .top-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; margin-top: 0.75rem; }
        .top-card { background: rgba(15,23,42,0.85); backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: 10px; padding: 0.75rem 1rem; }
        .top-rank { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
        .top-domain { font-weight: 600; color: var(--accent-color, #3b82f6); font-size: 0.85rem; word-break: break-all; }
        .top-meta { font-size: 0.78rem; color: var(--text-secondary); margin-top: 2px; }
        .top-speed { font-weight: 700; color: #10b981; font-size: 0.95rem; }

        .stats-table-wrapper { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border-color); }
        .stats-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
        .stats-table th { background: rgba(15,23,42,0.9); color: var(--text-secondary); font-weight: 600; padding: 0.6rem 0.75rem; text-align: left; white-space: nowrap; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; cursor: pointer; user-select: none; }
        .stats-table th:last-child { cursor: default; }
        .stats-table th .sort-arrow { font-size: 0.65rem; margin-left: 4px; opacity: 0.3; }
        .stats-table th.sort-active .sort-arrow { opacity: 1; }
        .stats-table td { padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(148,163,184,0.06); color: var(--text-primary); }
        .stats-table tbody tr:hover { background: rgba(148,163,184,0.05); }
        .stats-table .num { text-align: right; font-family: 'Courier New', monospace; font-weight: 600; }
        .stats-table .num.green { color: #10b981; }
        .stats-table .num.yellow { color: #eab308; }
        .stats-table .num.red { color: #ef4444; }
        .stats-table .num.muted { color: var(--text-secondary); }
        .val-hover { cursor: help; border-bottom: 1px dotted var(--text-secondary); }
        .stats-table .actions-cell { white-space: nowrap; }

        .stats-btn { padding: 0.25rem 0.5rem; border-radius: 6px; border: 1px solid var(--border-color); background: rgba(15,23,42,0.8); color: var(--text-primary); font-size: 0.72rem; cursor: pointer; transition: background 0.2s; }
        .stats-btn:hover { background: rgba(30,41,59,0.9); }
        .stats-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .stats-btn.accent { background: rgba(59,130,246,0.2); border-color: rgba(59,130,246,0.3); }
        .stats-btn.accent:hover { background: rgba(59,130,246,0.35); }

        .bulk-actions { display: flex; align-items: center; gap: 1rem; margin-top: 1rem; padding: 0.75rem 1rem; background: rgba(15,23,42,0.85); backdrop-filter: blur(12px); border: 1px solid var(--border-color); border-radius: 10px; flex-wrap: wrap; }
        .bulk-btn { padding: 0.4rem 1rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--panel-bg); color: var(--text-primary); font-size: 0.82rem; font-family: inherit; cursor: pointer; transition: background 0.2s; }
        .bulk-btn:hover { background: rgba(30,41,59,0.9); }
        .bulk-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .bulk-count { font-size: 0.82rem; color: var(--text-secondary); }

        .loading-msg { text-align: center; color: var(--text-secondary); padding: 3rem 0; font-size: 0.9rem; }

        .queue-badge { display: inline-block; font-size: 0.72rem; padding: 2px 8px; border-radius: 10px; background: rgba(234,179,8,0.25); color: #eab308; margin-left: 0.5rem; vertical-align: middle; }
        .queue-clear-btn { display: inline-block; font-size: 0.68rem; padding: 2px 6px; border-radius: 6px; background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); cursor: pointer; margin-left: 0.3rem; vertical-align: middle; transition: background 0.2s; }
        .queue-clear-btn:hover { background: rgba(239,68,68,0.4); }

        #statsToast { position: fixed; bottom: 2rem; right: 2rem; background: var(--panel-bg); backdrop-filter: blur(12px); border: 1px solid var(--border-color); padding: 1rem; border-radius: 8px; color: var(--text-primary); transform: translateY(150%); transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275); z-index: 100; max-width: 400px; font-size: 0.85rem; }
        #statsToast.show { transform: translateY(0); }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>
                <a href="/" class="header-title-link"><img src="/static/favicon.svg" alt="" class="header-logo">Statistics</a>
                <span id="queueBadge" class="queue-badge" style="display:none;cursor:pointer;" onclick="window.location='/'"></span>
                <button id="queueClearBtn" class="queue-clear-btn" style="display:none;" title="Clear queue">&#10005; Clear</button>
            </h1>
            <div class="header-actions">
                <a href="/" class="header-link-btn" title="Back to Dashboard">&larr; Dashboard</a>
                <a href="/map" class="header-link-btn" title="Server Map">&#127760; Map</a>
                <a href="/config" class="header-link-btn" title="Config">&#9881; Config</a>
                <div class="status-indicator" id="statusIndicator">
                    <span class="dot" id="globalStatus"></span>
                    <span class="wave-bars" id="waveBars">
                        <span class="wave-bar"></span><span class="wave-bar"></span><span class="wave-bar"></span><span class="wave-bar"></span>
                    </span>
                    <span id="statusText">Ready</span>
                </div>
            </div>
        </header>

        <main>
            <section class="glass-panel top-section" id="topSection" style="display:none;">
                <div class="top-header">
                    <h3>&#11088; Top <select id="topNSelect" class="top-select"></select> Recommended Servers</h3>
                    <span style="font-size:0.78rem; color:var(--text-secondary);">Best download speed per country</span>
                </div>
                <div class="top-grid" id="topGrid"></div>
            </section>

            <section class="glass-panel">
                <div id="statsLoading" class="loading-msg">Loading statistics...</div>
                <div class="stats-table-wrapper" id="statsTableWrapper" style="display:none;">
                    <table class="stats-table" id="statsTable">
                        <thead>
                            <tr>
                                <th data-key="country">Country <span class="sort-arrow">&#9650;</span></th>
                                <th data-key="servers" style="text-align:right;">Servers <span class="sort-arrow">&#9650;</span></th>
                                <th data-key="lowest_latency" style="text-align:right;">Lowest Latency <span class="sort-arrow">&#9650;</span></th>
                                <th data-key="highest_download" style="text-align:right;">Best Download <span class="sort-arrow">&#9650;</span></th>
                                <th data-key="highest_upload" style="text-align:right;">Best Upload <span class="sort-arrow">&#9650;</span></th>
                                <th data-key="succeeded" style="text-align:right;">Succeeded <span class="sort-arrow">&#9650;</span></th>
                                <th data-key="failed" style="text-align:right;">Failed <span class="sort-arrow">&#9650;</span></th>
                                <th data-key="untested" style="text-align:right;">Untested <span class="sort-arrow">&#9650;</span></th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="statsBody"></tbody>
                    </table>
                </div>

                <div class="bulk-actions" id="bulkActions" style="display:none;">
                    <button class="bulk-btn" id="bulkUntestedBtn" disabled>&#9654; Speedtest All Untested</button>
                    <span class="bulk-count" id="bulkUntestedCount"></span>
                    <button class="bulk-btn" id="bulkFailedBtn" disabled>&#128260; Retry All Failed</button>
                    <span class="bulk-count" id="bulkFailedCount"></span>
                </div>
            </section>
        </main>
    </div>

    <div id="statsToast"></div>

    <script>
    (function () {
        'use strict';

        let allCountries = [];
        let totalUntested = 0;
        let totalFailed = 0;
        let totalCountriesAvailable = 0;
        let currentTopN = 5;

        // Sort state
        let sortKey = 'country';
        let sortAsc = true;

        // Queue poll timer
        let queuePollTimer = null;

        // ---- Toast ----
        function showToast(msg, isError) {
            const t = document.getElementById('statsToast');
            t.textContent = msg;
            t.style.borderLeft = isError ? '4px solid #ef4444' : '4px solid #10b981';
            t.classList.add('show');
            clearTimeout(t._tid);
            t._tid = setTimeout(() => t.classList.remove('show'), 5000);
        }

        // ---- Queue badge (from server) ----
        let lastQueueActive = false;

        async function pollQueue() {
            try {
                const resp = await fetch('/api/queue/status');
                const data = await resp.json();
                const busy = data.pending > 0 || data.active || data.scan_active;
                updateQueueBadge(data);
                if (busy) {
                    scheduleQueuePoll();
                } else {
                    stopQueuePoll();
                    if (lastQueueActive) loadStats();  // Refresh when queue finishes
                }
                lastQueueActive = busy;
            } catch {}
        }

        function updateQueueBadge(data) {
            const badge = document.getElementById('queueBadge');
            const clearBtn = document.getElementById('queueClearBtn');
            if (data && (data.pending > 0 || data.active)) {
                const parts = [];
                if (data.active) {
                    let runText = data.active.label || 'speedtest';
                    if (data.progress_total > 0) runText += ` ${data.progress_done}/${data.progress_total}`;
                    parts.push(`Running: ${runText}`);
                }
                if (data.pending > 0) parts.push(`${data.pending} queued (${data.total_domains} servers)`);
                badge.textContent = parts.join(' · ');
                badge.style.display = '';
                clearBtn.style.display = data.pending > 0 ? '' : 'none';
            } else {
                badge.style.display = 'none';
                clearBtn.style.display = 'none';
            }
        }

        function scheduleQueuePoll() {
            if (queuePollTimer) return;
            queuePollTimer = setInterval(pollQueue, 5000);
        }

        function stopQueuePoll() {
            if (queuePollTimer) { clearInterval(queuePollTimer); queuePollTimer = null; }
        }

        // ---- Clear queue ----
        document.getElementById('queueClearBtn').addEventListener('click', async () => {
            try {
                const resp = await fetch('/api/queue/clear', { method: 'POST' });
                const data = await resp.json();
                showToast(`Queue cleared (${data.removed} job(s) removed)`);
                stopQueuePoll();
                updateQueueBadge({ pending: 0 });
            } catch (e) { showToast('Error clearing queue: ' + e.message, true); }
        });

        // ---- Load statistics ----
        async function loadStats() {
            try {
                const resp = await fetch(`/api/statistics?top=${currentTopN}`);
                const data = await resp.json();
                allCountries = data.countries || [];
                totalCountriesAvailable = data.total_countries || allCountries.length;
                buildTopNSelector();
                renderTop(data.top || []);
                sortAndRender();
                document.getElementById('statsLoading').style.display = 'none';
                document.getElementById('statsTableWrapper').style.display = '';
                document.getElementById('bulkActions').style.display = '';
            } catch (e) {
                document.getElementById('statsLoading').textContent = 'Failed to load statistics.';
            }
        }

        // ---- Top N selector ----
        function buildTopNSelector() {
            const sel = document.getElementById('topNSelect');
            if (sel.options.length > 0) return;
            const options = [5, 10, 15, 20, 25];
            if (totalCountriesAvailable > 0 && !options.includes(totalCountriesAvailable)) {
                options.push(totalCountriesAvailable);
                options.sort((a, b) => a - b);
            }
            options.forEach(n => {
                const opt = document.createElement('option');
                opt.value = n;
                opt.textContent = n >= totalCountriesAvailable ? `All (${totalCountriesAvailable})` : n;
                if (n === currentTopN) opt.selected = true;
                sel.appendChild(opt);
            });
            sel.addEventListener('change', () => {
                currentTopN = parseInt(sel.value);
                loadStats();
            });
        }

        // ---- Render top servers ----
        function renderTop(topList) {
            if (!topList.length) return;
            const grid = document.getElementById('topGrid');
            grid.innerHTML = '';
            topList.forEach((s, i) => {
                const card = document.createElement('div');
                card.className = 'top-card';
                card.innerHTML = `
                    <div class="top-rank">#${i + 1} — ${s.country}</div>
                    <div class="top-domain">${s.domain}</div>
                    <div class="top-meta">${s.city}</div>
                    <div class="top-speed">${s.rx_speed_mbps.toFixed(1)} Mbps &#8595;</div>
                    <div class="top-meta">${s.tx_speed_mbps ? s.tx_speed_mbps.toFixed(1) + ' Mbps &#8593;' : ''} ${s.latency_ms ? '&middot; ' + s.latency_ms.toFixed(1) + ' ms' : ''}</div>
                `;
                grid.appendChild(card);
            });
            document.getElementById('topSection').style.display = '';
        }

        // ---- Sorting ----
        function getSortVal(c, key) {
            const v = c[key];
            if (v == null) return key === 'country' ? '' : -Infinity;
            return v;
        }

        function sortAndRender() {
            const sorted = [...allCountries].sort((a, b) => {
                let va = getSortVal(a, sortKey), vb = getSortVal(b, sortKey);
                if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb || '').toLowerCase(); }
                if (va < vb) return sortAsc ? -1 : 1;
                if (va > vb) return sortAsc ? 1 : -1;
                return 0;
            });
            renderTable(sorted);
            document.querySelectorAll('#statsTable th[data-key]').forEach(th => {
                const arrow = th.querySelector('.sort-arrow');
                if (th.dataset.key === sortKey) {
                    th.classList.add('sort-active');
                    arrow.innerHTML = sortAsc ? '&#9650;' : '&#9660;';
                } else {
                    th.classList.remove('sort-active');
                    arrow.innerHTML = '&#9650;';
                }
            });
        }

        document.querySelectorAll('#statsTable th[data-key]').forEach(th => {
            th.addEventListener('click', () => {
                const key = th.dataset.key;
                if (sortKey === key) { sortAsc = !sortAsc; }
                else { sortKey = key; sortAsc = key === 'country'; }
                sortAndRender();
            });
        });

        // ---- Render table ----
        function renderTable(countries) {
            const tbody = document.getElementById('statsBody');
            tbody.innerHTML = '';
            totalUntested = 0;
            totalFailed = 0;

            countries.forEach(c => {
                totalUntested += c.untested;
                totalFailed += c.failed;

                const tr = document.createElement('tr');
                const latCell = c.lowest_latency != null
                    ? `<td class="num green val-hover" title="${c.lowest_latency_server}">${c.lowest_latency.toFixed(2)} ms</td>`
                    : `<td class="num muted">—</td>`;
                const dlCell = c.highest_download != null
                    ? `<td class="num green val-hover" title="${c.highest_download_server}">${c.highest_download.toFixed(1)} Mbps</td>`
                    : `<td class="num muted">—</td>`;
                const ulCell = c.highest_upload != null
                    ? `<td class="num green val-hover" title="${c.highest_upload_server}">${c.highest_upload.toFixed(1)} Mbps</td>`
                    : `<td class="num muted">—</td>`;

                const country = c.country;
                const escCountry = country.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                tr.innerHTML = `
                    <td><strong>${country}</strong></td>
                    <td class="num">${c.servers}</td>
                    ${latCell}
                    ${dlCell}
                    ${ulCell}
                    <td class="num green">${c.succeeded}</td>
                    <td class="num ${c.failed > 0 ? 'red' : 'muted'}">${c.failed}</td>
                    <td class="num ${c.untested > 0 ? 'yellow' : 'muted'}">${c.untested}</td>
                    <td class="actions-cell">
                        ${c.untested > 0 ? `<button class="stats-btn" data-country="${escCountry}" data-type="untested">&#9654; Untested (${c.untested})</button>` : ''}
                        ${c.failed > 0 ? `<button class="stats-btn accent" data-country="${escCountry}" data-type="failed">&#128260; Failed (${c.failed})</button>` : ''}
                    </td>
                `;
                tbody.appendChild(tr);
            });

            // Totals row
            const totals = countries.reduce((acc, c) => {
                acc.servers += c.servers;
                acc.succeeded += c.succeeded;
                acc.failed += c.failed;
                acc.untested += c.untested;
                return acc;
            }, { servers: 0, succeeded: 0, failed: 0, untested: 0 });

            const tfoot = document.createElement('tr');
            tfoot.style.cssText = 'background:rgba(15,23,42,0.9);font-weight:700;border-top:2px solid var(--border-color);';
            tfoot.innerHTML = `
                <td>Total (${countries.length} countries)</td>
                <td class="num">${totals.servers}</td>
                <td class="num muted">—</td>
                <td class="num muted">—</td>
                <td class="num muted">—</td>
                <td class="num green">${totals.succeeded}</td>
                <td class="num ${totals.failed > 0 ? 'red' : 'muted'}">${totals.failed}</td>
                <td class="num ${totals.untested > 0 ? 'yellow' : 'muted'}">${totals.untested}</td>
                <td></td>
            `;
            tbody.appendChild(tfoot);

            // Attach action button handlers
            tbody.querySelectorAll('.stats-btn[data-country]').forEach(btn => {
                btn.addEventListener('click', () => {
                    queueCountry(btn.dataset.country, btn.dataset.type);
                });
            });

            document.getElementById('bulkUntestedCount').textContent = `${totalUntested} untested servers`;
            document.getElementById('bulkFailedCount').textContent = `${totalFailed} failed servers`;
            document.getElementById('bulkUntestedBtn').disabled = totalUntested === 0;
            document.getElementById('bulkFailedBtn').disabled = totalFailed === 0;
        }

        // ---- Queue (server-side) ----
        async function queueCountry(country, type) {
            try {
                const resp = await fetch(`/api/statistics/domains?country=${encodeURIComponent(country)}`);
                const data = await resp.json();
                const domains = type === 'untested' ? data.untested : data.failed;
                if (!domains.length) { showToast(`No ${type} servers in ${country}`, true); return; }
                await addToQueue(domains, type, `${country} (${type})`);
            } catch (e) {
                showToast('Error: ' + e.message, true);
            }
        }

        async function addToQueue(domains, type, label) {
            try {
                const resp = await fetch('/api/queue/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ domains, type, label })
                });
                const data = await resp.json();
                if (resp.ok) {
                    showToast(`Queued ${domains.length} ${type} server(s): ${label}`);
                    pollQueue();
                    scheduleQueuePoll();
                } else {
                    showToast(data.message || 'Failed to queue', true);
                }
            } catch (e) {
                showToast('Error: ' + e.message, true);
            }
        }

        document.getElementById('bulkUntestedBtn').addEventListener('click', async () => {
            try {
                const resp = await fetch('/api/statistics/domains');
                const data = await resp.json();
                if (!data.untested.length) return;
                await addToQueue(data.untested, 'untested', 'All untested');
            } catch (e) { showToast('Error: ' + e.message, true); }
        });

        document.getElementById('bulkFailedBtn').addEventListener('click', async () => {
            try {
                const resp = await fetch('/api/statistics/domains');
                const data = await resp.json();
                if (!data.failed.length) return;
                await addToQueue(data.failed, 'failed', 'All failed');
            } catch (e) { showToast('Error: ' + e.message, true); }
        });

        // Initial load
        loadStats();
        pollQueue();  // Check if there's already a queue from before
    })();
    </script>
    <script>
    (function(){
        let poll;
        async function checkScan(){
            try{
                const r=await fetch('/api/scan/status');
                const d=await r.json();
                const dot=document.getElementById('globalStatus');
                const wb=document.getElementById('waveBars');
                const si=document.getElementById('statusIndicator');
                const st=document.getElementById('statusText');
                if(d.active){
                    dot.className='dot running';
                    wb.classList.add('visible');
                    si.classList.add('active');
                    const pct=d.progress&&d.progress.total>0?Math.round(d.progress.done/d.progress.total*100):0;
                    st.textContent=d.progress&&d.progress.total>0?'Scanning '+pct+'%':'Scanning\u2026';
                    if(!poll) poll=setInterval(checkScan,2000);
                }else{
                    dot.className='dot completed';
                    wb.classList.remove('visible');
                    si.classList.remove('active');
                    st.textContent='Ready';
                    if(poll){clearInterval(poll);poll=null;}
                }
            }catch(e){}
        }
        checkScan();
    })();
    </script>
</body>

</html>
